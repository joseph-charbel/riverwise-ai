server_config:
    use_dummy: false # set to false to use the real AI model
    default_grade_level: "8"
    default_interest: "General"

chat_model_config:
#     provider: groq
#     model: llama-3.1-8b-instant
    provider: google
    model: gemini-2.5-flash-lite
    kwargs:
        temperature: 0.01

prompts_config:
    # system_prompt_file: prompts/meta.txt # prompt based on meta strategy (https://github.com/meta-prompting/meta-prompting?tab=readme-ov-file)
    system_prompt_file: prompts/dynamic.txt # dynamic prompt
    # system_prompt_file: prompts/simple.txt # simple prompt
    # system_prompt_file: prompts/original.txt # original prompt

grade_rules:
  - start: 0
    end: 4
    rules: |
      - **Target Audience:** 10 to 12-year-old students. Assume English is their second language and they read at a beginner-to-intermediate level.
        - **Rule 1: Simple Vocabulary:** Use common, everyday English words. Absolutely no jargon, complex academic terms, or Western idioms. If a scientific or historical term must be used, define it simply in the same sentence.
        - **Rule 2: Short Sentences:** Keep sentences under 15 words. Stick to exactly one clear idea per sentence. 
        - **Rule 3: Concrete Concepts:** Explain ideas using physical things the student can see, touch, or easily imagine in their daily life. Avoid abstract theories.
        - **Rule 4: Active Voice:** Always use active verbs (e.g., "The sun heats the earth" instead of "The earth is heated by the sun").
  - start: 5
    end: 6
    rules: |
      - **Target Audience:** 11 to 13-year-old students. Assume English is their second language and they read at an intermediate level.
        - **Rule 1: Contextual Vocabulary:** You may introduce basic scientific or subject-specific terms (e.g., "ecosystem," "bacteria," "sanitation"), but you must provide clear context clues within the same sentence. Strictly avoid cultural slang or idioms.
        - **Rule 2: Compound Sentences:** Sentences can be up to 20 words. You may use simple compound sentences connected by "and," "but," "so," or "because" to show relationships. Avoid nested clauses or formal transitions like "nevertheless" or "furthermore."
        - **Rule 3: Process-Oriented Concepts:** You can explain simple invisible processes (like how germs spread or how a filtration system works), but you must always link the final outcome back to a physical, real-world result they can observe.
        - **Rule 4: Active Cause-and-Effect:** Always use the active voice and clearly link cause and effect (e.g., "Drinking untreated water causes sickness" instead of "Sickness can be caused by untreated water").
  - start: 7
    end: 10
    rules: |
      - **Target Audience:** 13 to 16-year-old students. Assume English is their second language and they read at an intermediate-to-advanced level.
        - **Rule 1: Domain Vocabulary:** Use standard scientific, historical, or subject-specific terminology naturally. You only need to provide in-line definitions for highly specialized or niche concepts. Still strictly avoid Western idioms or slang.
        - **Rule 2: Complex Sentences:** You may use a mix of compound and complex sentences (up to 25 words). Use clear transition words like "however," "therefore," and "as a result" to connect ideas.
        - **Rule 3: Systems Thinking:** Explain concepts as interconnected systems rather than isolated facts. Detail how multiple variables interact (e.g., not just "pollution hurts fish," but "pollution depletes oxygen, which harms the aquatic ecosystem").
        - **Rule 4: Objective Tone:** Use a standard, objective textbook tone. Remove conversational elements, but avoid excessively dense passive voice.
  - start: 11
    end: 12
    rules: |
      - **Target Audience:** 16 to 18-year-old students preparing for university or the workforce. Assume advanced ESL proficiency.
        - **Rule 1: Academic Vocabulary:** Use precise academic and professional vocabulary. Assume the reader understands foundational subject concepts.
        - **Rule 2: Analytical Structure:** Sentences can be up to 35 words. Use multi-clause structures to communicate nuance, conditions, and exceptions. 
        - **Rule 3: Theoretical & Abstract Concepts:** You may explore abstract theories, long-term implications, and conceptual frameworks. The example analogy should map to complex structural mechanics rather than simple physical movements.
        - **Rule 4: Formal Voice:** Maintain an authoritative, formal, and analytical voice. You may use the passive voice if it is standard for the specific academic discipline (e.g., in chemistry or physics contexts).
  # - start: 9
  #   end: 12
  #   rules: |
  #     Use nuanced vocabulary and maintain the data's original precision while using the metaphor for structural flow.
