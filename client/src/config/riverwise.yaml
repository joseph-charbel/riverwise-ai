scenes:
    # ── Farm ──────────────────────────────────────────────────────────────
    - node_id: farm
      background_asset: assets/scenes/farm.png
      hotspots:

          - id: info_farm_runoff
            type: info
            geometry: { shape: rect, x: 50, y: 350, w: 100, h: 75 }
            title: Agricultural Runoff
            body: >-
                Farmers use fertilisers to help crops grow strong and healthy. However, when too much fertiliser is used, rain can wash it off the soil.
                
                This is called runoff. The fertiliser can flow into rivers, making the water dirty and unsafe.

            target_mechanic: Nutrient pollution and algal bloom formation.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: false
            fun_fact: 💡Did you know? Studies show that too many nutrients in water can cause algae to grow quickly, which reduces oxygen for fish and harms them as you saw before!

          - id: info_farm_irrigation
            type: info
            geometry: { shape: rect, x: 615, y: 350, w: 150, h: 100 }
            title: Irrigation Channels
            body: >-
                Farmers use water from rivers to grow crops. This is called irrigation. 
                If the river water is dirty, it can carry germs and pollution onto fruits 
                and vegetables. This means food may not be safe to eat unless it is properly 
                cleaned. Clean water is very important for both farming and health.

            target_mechanic: Water over-extraction and resulting habitat degradation.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true

          - id: info_farm_soil
            type: info
            geometry: { shape: rect, x: 275, y: 430, w: 150, h: 100 }
            title: Soil Erosion
            body: >-
                Water that flows off farms can carry soil, fertiliser, and waste into nearby rivers.
                
                This can make the river cloudy and polluted.

                Polluted water can affect animals, plants, and people who depend on the river. Managing farm waste and runoff helps keep rivers clean.

            target_mechanic: Soil erosion leading to high turbidity and sunlight blockage.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: false
            fun_fact: 💡Did you know? Cloudy water (called high sediment) can block sunlight and harm plants and fish in the river.

          - id: info_farm_native_vegetation
            type: info
            geometry: { shape: rect, x: 600, y: 210, w: 80, h: 100 }
            title: Riparian Buffer Zones
            body: >-
                Plants and trees growing between farms and the river act like nature’s filter. 
                Their roots help catch dirt and soak up extra nutrients before they can get into the water. 
                This is one of the easiest and best ways to help keep rivers clean and healthy.

            target_mechanic: Natural filtration via riparian buffer vegetation.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

      questions:
          - question: What is the primary effect of agricultural runoff on a river?
            options:
                - It makes the water warmer
                - It triggers algal blooms that deplete oxygen
                - It increases the river's flow speed
                - It makes the water taste salty
            correct: 1

          - question: Why are riparian buffer zones effective at protecting rivers?
            options:
                - They shade the water from sunlight
                - Their roots trap sediment and absorb nutrients
                - They prevent flooding
                - They attract predatory fish
            correct: 1

          - question: How does livestock access to waterways affect water quality?
            options:
                - It adds beneficial minerals
                - It introduces bacteria like E. coli
                - It cools the water temperature
                - It has no measurable effect
            correct: 1

    # ── Village ───────────────────────────────────────────────────────────
    - node_id: village
      background_asset: assets/scenes/village.png
      hotspots:

          - id: info_village_well
            type: info
            geometry: { shape: rect, x: 305, y: 305, w: 125, h: 70 }
            title: Rain Carries Waste
            body: >-
                When rubbish is left on the ground, rainwater can wash it away.
                This water flows over land and carries waste into drains, streams, 
                and rivers. This process is called runoff. In villages and towns, 
                poor waste management means more rubbish can end up in rivers, especially
                during heavy rain.
            target_mechanic:  Runoff transporting waste into waterways during rain events.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: false
            fun_fact: >-
                Did you know? Runoff is a major contributor to water pollution. It can carry harmful chemicals, bacteria, and other pollutants into rivers and streams.

          - id: info_village_waste
            type: info
            geometry: { shape: rect, x: 200, y: 330, w: 100, h: 100 }
            title: Household Wastewater
            body: >-
                Water used in homes—for washing clothes, dishes, and bathing—is called wastewater.
                In many areas, this water is not treated before being released into the environment. It can flow through pipes or open drains directly into rivers. Wastewater can carry soap, dirt, and harmful germs, which pollute rivers and make the water unsafe for people and animals.
            target_mechanic: Untreated domestic wastewater and pathogen introduction.

            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_village_bridge
            type: info
            geometry: { shape: rect, x: 370, y: 450, w: 125, h: 60 }
            title: Medicines in Rivers
            body: >-
                Medicines should be disposed of carefully, but sometimes they are thrown away with regular waste.
                Rainwater can carry these substances into rivers. Even small amounts of medicines can affect water quality and harm aquatic life. Safe disposal of medicines helps reduce pollution and protect ecosystems.
            target_mechanic: Pharmaceutical pollution from improper disposal.

            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

      questions:
          - question: How can contaminants from the river affect the village well?
            options:
                - They travel through underground pipes
                - They seep into the shared aquifer
                - They evaporate and fall as acid rain
                - They cannot — wells are completely separate
            correct: 1

          - question: Why are phosphates in household detergents harmful to rivers?
            options:
                - They dissolve fish scales
                - They fuel algal growth
                - They raise water temperature
                - They make the water cloudy
            correct: 1

          - question: What is the benefit of rainwater harvesting for river health?
            options:
                - It increases river flow
                - It reduces stormwater runoff volume
                - It raises groundwater levels
                - It filters out heavy metals
            correct: 1

    # ── Kids Play Area ────────────────────────────────────────────────────
    - node_id: kids_play_area
      background_asset: assets/scenes/kids-play-area-bad.png
      hotspots:

          - id: info_kids_macroinvertebrates
            type: info
            geometry: { shape: rect, x: 120, y: 410, w: 90, h: 90 }
            title: Plastic Bag Near The River
            body: >-
                Plastic bottles and wrappers are common types of rubbish found in rivers.
                Unlike food or paper, plastic does not break down quickly. It can stay in
                the environment for many years.

                Fish and other animals may mistake plastic for food, which can make them sick. 
                Plastic can also block waterways or get tangled around plants and animals.
                
                To protect rivers, plastic waste should be placed in bins or recycling, not 
                left on the ground where it can wash into the water.

                💡Did you know? A single plastic bottle can take hundreds of years to break down.

            target_mechanic: Impacts of plastic pollution on aquatic life and waterways.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_kids_safety
            type: info
            geometry: { shape: rect, x: 500, y: 430, w: 60, h: 60 }
            title: Fish Swimming in the Rubbish
            body: >-
                Rivers are home to many animals, including fish, insects, and birds. 
                These animals depend on clean water to survive.
               
                When rubbish enters the river, it can damage habitats and make it 
                harder for animals to find food or breathe properly.
                
                Clean rivers support healthy ecosystems and also provide water that 
                communities can safely use.

            target_mechanic: Rubbish in rivers damaging habitats
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          #- id: info_kids_biodiversity
          #  type: info
          #  geometry: { shape: rect, x: 700, y: 150, w: 60, h: 60 }
          #  title: 
          #  body: >-
          #      Healthy rivers support an extraordinary web of life — fish,
          #      amphibians, birds, insects and plants all depend on clean,
          #      flowing water. When one species declines, ripple effects can
          #      disrupt the entire food chain.
          #      target_mechanic: Ecosystem interdependence and food web disruption.
          #      image_asset: assets/nodes/Square_-_black_simple-cropped.svg

          - id: info_kids_litter
            type: info
            geometry: { shape: rect, x: 190, y: 240, w: 100, h: 100 }
            title: Stormwater Drain or Pipe
            body: >-
                During rain, water flows into drains and pipes that carry it away from roads and buildings. This water is called stormwater.
                Stormwater often flows directly into rivers without being cleaned first. If rubbish or pollution enters the drain, it can travel straight into the river.
                Keeping streets and public places clean helps stop pollution from reaching waterways.
                
                💡Did you know? Studies in Nepal show that urban drainage systems often carry waste directly into rivers without treatment. In cities like Kathmandu, many drains and pipes release untreated wastewater straight into rivers like the Bagmati.

            target_mechanic: Microplastic degradation and wildlife ingestion.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          # - id: info_kids_citizen_science
          #   type: info
          #   geometry: { shape: rect, x: 150, y: 100, w: 60, h: 60 }
          #   title: Citizen Science
          #   body: >-
          #       You don't need a lab to help — recording observations like water
          #       colour, smell, wildlife sightings and litter counts builds a
          #       valuable dataset. Schools and community groups feed this data
          #       into regional water quality databases used by scientists.
          #   target_mechanic: Community data collection for scientific monitoring.
          #   image_asset: assets/nodes/Square_-_black_simple-cropped.svg

      questions:
          - question: Why are macroinvertebrates useful indicators of water quality?
            options:
                - They change colour in polluted water
                - Their presence or absence reflects water conditions
                - They produce chemicals that neutralise pollutants
                - They are easy to see from the river bank
            correct: 1

          - question: When do bacteria counts in rivers typically spike?
            options:
                - During droughts
                - After heavy rainfall
                - At night
                - In winter only
            correct: 1

          - question: How do microplastics enter the food chain?
            options:
                - They dissolve into the water
                - Fish and birds mistake them for food
                - They are absorbed through plant roots
                - They evaporate into the air
            correct: 1

    # ── Temple ────────────────────────────────────────────────────────────
    - node_id: temple
      background_asset: assets/scenes/temple.png
      hotspots:
          - id: temple_to_farm
            type: navigation
            geometry: { shape: rect, x: 10, y: 400, w: 80, h: 80 }
            target_node: farm

          - id: temple_to_factories
            type: navigation
            geometry: { shape: rect, x: 850, y: 300, w: 100, h: 80 }
            target_node: factories

          - id: info_temple_cultural
            type: info
            geometry: { shape: rect, x: 450, y: 100, w: 60, h: 60 }
            title: Cultural Significance
            body: >-
                For centuries, communities along this river have regarded it as
                sacred. Rituals of gratitude for clean water reinforce a cultural
                ethic of stewardship — a powerful motivator for conservation that
                predates modern environmental science.
            target_mechanic: Cultural stewardship and historical conservation ethics.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_temple_waterfall
            type: info
            geometry: { shape: rect, x: 700, y: 200, w: 60, h: 60 }
            title: The Waterfall
            body: >-
                Waterfalls aerate the river, boosting dissolved oxygen levels.
                This natural oxygenation supports fish and other aquatic life
                downstream. Dams and weirs that flatten the flow can reduce this
                effect, creating low-oxygen "dead zones."
            target_mechanic: Natural aeration generating dissolved oxygen.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_temple_offerings
            type: info
            geometry: { shape: rect, x: 250, y: 300, w: 60, h: 60 }
            title: Eco-Friendly Offerings
            body: >-
                Traditional offerings made from flowers and leaves are
                biodegradable and harmless. However, modern substitutes —
                plastic wrappings, synthetic dyes, chemical candles — can pollute
                the river. Many temples now promote eco-friendly alternatives.
            target_mechanic: Environmental impact of biodegradable versus synthetic materials.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_temple_springs
            type: info
            geometry: { shape: rect, x: 150, y: 150, w: 60, h: 60 }
            title: Mountain Springs
            body: >-
                The river originates from mountain springs fed by snowmelt and
                rainfall. Deforestation on the slopes accelerates erosion and
                reduces the land's ability to absorb water, leading to flash
                floods in the wet season and drought in the dry season.
            target_mechanic: Deforestation altering upstream water cycles and flow rates.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_temple_forest
            type: info
            geometry: { shape: rect, x: 550, y: 380, w: 60, h: 60 }
            title: Sacred Groves
            body: >-
                Forests around the temple are protected by tradition. These
                groves act as the river's lungs — their root systems anchor
                soil, their canopy regulates temperature, and leaf litter feeds
                a micro-ecosystem of decomposers that keeps the water clean.
            target_mechanic: Forest micro-ecosystems acting as natural climate and soil regulators.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

      questions:
          - question: How do waterfalls benefit aquatic life downstream?
            options:
                - They create barriers that protect fish from predators
                - They aerate the water, boosting dissolved oxygen
                - They filter out pollutants naturally
                - They lower the water temperature
            correct: 1

          - question: Why is deforestation on mountain slopes harmful to rivers?
            options:
                - It blocks sunlight from reaching the water
                - It accelerates erosion and disrupts water absorption
                - It introduces invasive plant species
                - It attracts more wildlife to the riverbank
            correct: 1

          - question: What makes traditional flower and leaf offerings safer for rivers than modern substitutes?
            options:
                - They sink to the bottom quickly
                - They are biodegradable
                - They repel fish
                - They dissolve immediately
            correct: 1

    # ── Factories ─────────────────────────────────────────────────────────
    - node_id: factories
      background_asset: assets/scenes/factories.png
      hotspots:

          - id: info_factories_discharge
            type: info
            geometry: { shape: rect, x: 370, y: 400, w: 50, h: 50 }
            title: Industrial Discharge
            body: >-
                Pipes carrying untreated or partially treated wastewater release
                heavy metals like mercury, lead and cadmium into the river.
                These toxins accumulate in fish tissue — a process called
                bioaccumulation — making them unsafe to eat.
            target_mechanic: Heavy metal toxicity and bioaccumulation in food chains.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_factories_thermal
            type: info
            geometry: { shape: rect, x: 375, y: 460, w: 175, h: 60 }
            title: Thermal Pollution
            body: >-
                Factories use river water for cooling and return it at a higher
                temperature. Warm water holds less dissolved oxygen, stressing
                cold-water species like trout. Even a few degrees of change can
                shift the entire ecosystem.
            target_mechanic: Thermal pollution reducing dissolved oxygen capacity.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_factories_regulation
            type: info
            geometry: { shape: rect, x: 5, y: 65, w: 230, h: 235 }
            title: Environmental Regulation
            body: >-
                Government regulations set limits on what factories can
                discharge. Monitoring stations measure pollutant levels
                continuously. When limits are breached, fines and mandatory
                clean-ups are enforced — but enforcement depends on funding and
                political will.
            target_mechanic: Regulatory monitoring and penalty enforcement.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

          - id: info_factories_treatment
            type: info
            geometry: { shape: rect, x: 725, y: 300, w: 130, h: 100 }
            title: Wastewater Treatment
            body: >-
                Modern treatment plants use physical, chemical and biological
                processes to remove contaminants before water is returned to the
                river. Constructed wetlands offer a low-energy alternative,
                using natural processes to break down pollutants.
            target_mechanic: Contaminant removal via industrial wastewater treatment.
            # image_asset: assets/nodes/Square_-_black_simple-cropped.svg
            include_example: true
            fun_fact: null

      questions:
          - question: What is bioaccumulation?
            options:
                - The growth of algae on factory pipes
                - The build-up of toxins in fish tissue over time
                - The increase in river flow near factories
                - The natural breakdown of pollutants
            correct: 1

          - question: How does thermal pollution affect cold-water species?
            options:
                - It forces them to migrate upstream
                - Warmer water holds less dissolved oxygen, stressing them
                - It makes them grow faster than normal
                - It has no significant effect
            correct: 1

          - question: What is a low-energy alternative to conventional wastewater treatment?
            options:
                - Chlorine dosing
                - Constructed wetlands
                - Reverse osmosis
                - Ultraviolet filtration
            correct: 1
