# Riverwise – unified game configuration
# Asset paths can reference any format Pixi.js supports (.svg, .png, .webp, …)

map:
  background_asset: assets/map/bg_map.svg
  nodes:
    - node_id: town_center
      label: Town Center
      x: 480
      y: 200
      icon_incomplete: assets/map/town_incomplete.svg
      icon_complete: assets/map/town_complete.svg

    - node_id: coffee_shop
      label: Coffee Shop
      x: 650
      y: 150
      icon_incomplete: assets/map/coffee_incomplete.svg
      icon_complete: assets/map/coffee_complete.svg

    - node_id: riverside
      label: Riverside
      x: 300
      y: 320
      icon_incomplete: assets/map/river_incomplete.svg
      icon_complete: assets/map/river_complete.svg

scenes:
  - node_id: town_center
    background_asset: assets/backgrounds/bg_town.svg
    hotspots:
      - id: to_coffee_shop
        type: navigation
        geometry: { shape: rect, x: 700, y: 180, w: 100, h: 160 }
        target_node: coffee_shop
        image_asset: assets/sprites/door_cafe.svg

      - id: to_riverside
        type: navigation
        geometry: { shape: rect, x: 50, y: 300, w: 120, h: 80 }
        target_node: riverside

      - id: street_lamp
        type: state_swap
        geometry: { shape: circle, x: 480, y: 200, r: 30 }
        states:
          - assets/sprites/lamp_off.svg
          - assets/sprites/lamp_on.svg
        current_state: 0
        sprite_x: 455
        sprite_y: 140

      - id: info_town_notice
        type: info
        geometry: { shape: rect, x: 350, y: 420, w: 120, h: 80 }
        title: Community Noticeboard
        body: >-
          The town centre serves as a hub for the local community. Recent water
          quality testing shows elevated turbidity levels downstream — residents
          are encouraged to report unusual changes in the river near the old mill.
        image_asset: assets/sprites/info_board.svg

      - id: info_town_bird
        type: info
        geometry: { shape: circle, x: 620, y: 120, r: 28 }
        title: Native Kingfisher
        body: >-
          The azure kingfisher (Ceyx azureus) is a reliable indicator of river
          health. Their presence signals clean, fish-rich water. Declining
          sightings near this stretch of the river may indicate rising pollution
          or habitat loss.
        image_asset: assets/sprites/info_bird.svg

    questions:
      - question: What does the presence of a kingfisher in a waterway most likely indicate?
        options:
          - High levels of industrial pollution
          - Clean, fish-rich water
          - Warm water temperatures
          - Nearby urban development
        correct: 1

      - question: What is the main concern flagged on the community noticeboard?
        options:
          - Noise complaints from the café
          - Elevated turbidity levels downstream
          - Flooding near the old mill
          - A lack of recycling bins
        correct: 1

      - question: What does elevated turbidity in a river most directly affect?
        options:
          - Water temperature only
          - The colour of river banks
          - Light penetration and aquatic life
          - Wind speed over the water
        correct: 2

  - node_id: coffee_shop
    background_asset: assets/backgrounds/bg_coffee.svg
    hotspots:
      - id: to_town
        type: navigation
        geometry: { shape: rect, x: 20, y: 350, w: 100, h: 120 }
        target_node: town_center
        image_asset: assets/sprites/exit_arrow.svg

      - id: info_coffee_cup
        type: info
        geometry: { shape: circle, x: 600, y: 300, r: 45 }
        title: Local Brew
        body: >-
          This café sources water directly from the riverwise catchment.
          Baristas have noticed a subtle change in taste over the past year — a
          sign that upstream activities may be affecting the water profile.
          Supporting local businesses that rely on clean water creates an
          economic incentive for river stewardship.
        image_asset: assets/sprites/info_cup.svg

      - id: info_coffee_window
        type: info
        geometry: { shape: rect, x: 140, y: 180, w: 90, h: 80 }
        title: River View Window
        body: >-
          From this window you can see the walking path that leads to the
          riverside. Locals use it daily for recreation. The health of this
          green corridor directly impacts biodiversity — native grasses and
          riparian vegetation act as natural filters, trapping sediment before
          it reaches the river.
        image_asset: assets/sprites/info_window.svg

    questions:
      - question: Why have baristas at the café noticed a change in the water's taste?
        options:
          - A new coffee blend was introduced
          - The water filter needs replacing
          - Upstream activities may be affecting the catchment
          - The pipes are made from copper
        correct: 2

      - question: What role does riparian vegetation along the walking path serve?
        options:
          - It provides shade for sunbathers
          - It acts as a natural filter for sediment
          - It prevents people from falling in
          - It improves mobile phone reception
        correct: 1

      - question: "Supporting local businesses that rely on clean water helps because it creates:"
        options:
          - A tax benefit for the council
          - An economic incentive for river stewardship
          - More jobs in the fishing industry
          - Higher prices for bottled water
        correct: 1

  - node_id: riverside
    background_asset: assets/backgrounds/bg_riverside.svg
    hotspots:
      - id: to_town
        type: navigation
        geometry: { shape: rect, x: 800, y: 200, w: 100, h: 140 }
        target_node: town_center

      - id: info_river_fish
        type: info
        geometry: { shape: circle, x: 480, y: 380, r: 40 }
        title: River Fish Population
        body: >-
          This stretch of river is home to several native fish species
          including the southern pygmy perch and the river blackfish. Both
          species are sensitive to changes in dissolved oxygen, temperature,
          and turbidity. Increased algal blooms — driven by nutrient runoff
          from nearby farms — are threatening their habitat.
        image_asset: assets/sprites/info_fish.svg

      - id: info_river_reeds
        type: info
        geometry: { shape: rect, x: 150, y: 240, w: 100, h: 120 }
        title: Riparian Vegetation
        body: >-
          The river reeds and sedges here play a vital ecological role. Their
          root systems stabilise the river bank, preventing erosion. They also
          filter nutrients and heavy metals from stormwater runoff. Removing
          these plants — even partially — can trigger rapid bank collapse and
          sediment plumes that smother fish breeding grounds downstream.
        image_asset: assets/sprites/info_reeds.svg

    questions:
      - question: Which two fish species mentioned are sensitive to turbidity and dissolved oxygen?
        options:
          - Goldfish and trout
          - Southern pygmy perch and river blackfish
          - Carp and catfish
          - Salmon and barramundi
        correct: 1

      - question: What is the primary driver of increased algal blooms threatening fish habitat?
        options:
          - Rising global temperatures
          - Nutrient runoff from nearby farms
          - Boat traffic on the river
          - Removal of native trees
        correct: 1

      - question: What happens to fish breeding grounds when riparian vegetation is removed?
        options:
          - Water temperature drops sharply
          - More sunlight reaches the fish
          - Sediment plumes can smother them
          - Fish move to deeper water
        correct: 2
