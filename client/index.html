<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riverwise</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Student Setup Overlay ── */

    #student-setup {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 9999;
      animation: setupIn 0.4s ease-out;
    }

    #student-setup.fade-out {
      animation: setupOut 0.35s ease-in forwards;
    }

    @keyframes setupIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes setupOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(1.02); }
    }

    .setup-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: #EEF7FF;
      border: 2px solid #4a9a6e;
      border-radius: 16px;
      padding: 40px 48px 36px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    .setup-title {
      font-family: Poppins, sans-serif;
      font-size: 28px;
      color: #114774;
      margin: 0;
    }

    .setup-subtitle {
      font-family: Nunito, sans-serif;
      font-size: 17px;
      color: #62748E;
      margin: -4px 0 8px;
    }

    .setup-label {
      font-family: Nunito, sans-serif;
      font-size: 17px;
      font-weight: 900;
      color: #16295c;
      align-self: flex-start;
      margin-bottom: -6px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .slider-bound {
      font-family: Nunito, sans-serif;
      font-size: 17px;
      color: #114774;
      min-width: 18px;
      text-align: center;
    }

    #grade-slider {
      flex: 1;
      accent-color: #E0A800;
      cursor: pointer;
    }

    .grade-value {
      font-family: Nunito, sans-serif;
      font-size: 17px;
      font-weight: 1000;
      color: #114774;
      margin-top: -8px;
    }

    #interest-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #1E88E5;
      border-radius: 8px;
      background: #D9F2FF;
      color: #114774;
      font-family: Poppins, sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      outline: none;
    }

    #interest-select:focus {
      border-color: #a6ccf0;
    }

    #setup-start {
      margin-top: 8px;
      padding: 12px 32px;
      border: 1px solid #1565c0;
      border-radius: 10px;
      background: #1E88E5;
      color: #E6F4FF;
      font-family: Poppins, sans-serif;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 0 #0f4f99, 0 8px 16px rgba(11, 68, 122, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      transition: background 0.2s, transform 0.1s, box-shadow 0.15s;
    }

    #setup-start:hover {
      background: #2a96f3;
      box-shadow: 0 4px 0 #0f4f99, 0 10px 20px rgba(11, 68, 122, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    #setup-start:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0f4f99, 0 4px 10px rgba(11, 68, 122, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
