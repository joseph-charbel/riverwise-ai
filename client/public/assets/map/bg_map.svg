<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d4a3e"/>
      <stop offset="50%" stop-color="#1e3a2f"/>
      <stop offset="100%" stop-color="#162a22"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2e5a47" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#parchment)"/>
  <rect width="960" height="540" fill="url(#grid)"/>

  <!-- Decorative border -->
  <rect x="12" y="12" width="936" height="516" fill="none" stroke="#3d6b55" stroke-width="2" rx="4"/>
  <rect x="20" y="20" width="920" height="500" fill="none" stroke="#2e5a47" stroke-width="1" rx="2"/>

  <!-- River paths connecting locations -->
  <path d="M 300 320 Q 380 280 480 200" fill="none" stroke="#4a9edd" stroke-width="4" opacity="0.6"/>
  <path d="M 480 200 Q 560 170 650 150" fill="none" stroke="#3a8ecc" stroke-width="3" opacity="0.5"/>
  <path d="M 300 320 Q 260 400 220 430" fill="none" stroke="#4a9edd" stroke-width="5" opacity="0.5"/>

  <!-- Location areas (subtle highlight regions) -->
  <ellipse cx="480" cy="200" rx="55" ry="40" fill="#3d6b55" opacity="0.25"/>
  <ellipse cx="650" cy="150" rx="50" ry="35" fill="#3d6b55" opacity="0.25"/>
  <ellipse cx="300" cy="320" rx="60" ry="40" fill="#1a5580" opacity="0.25"/>

  <!-- Trees / foliage decoration -->
  <circle cx="150" cy="100" r="20" fill="#2e5a3a" opacity="0.5"/>
  <circle cx="170" cy="115" r="15" fill="#3a6e45" opacity="0.5"/>
  <circle cx="800" cy="400" r="18" fill="#2e5a3a" opacity="0.5"/>
  <circle cx="820" cy="390" r="14" fill="#3a6e45" opacity="0.5"/>
  <circle cx="100" cy="450" r="22" fill="#2e5a3a" opacity="0.5"/>
  <circle cx="850" cy="120" r="16" fill="#2e5a3a" opacity="0.5"/>
  <circle cx="870" cy="135" r="12" fill="#3a6e45" opacity="0.5"/>

  <!-- Mountain symbols top-right -->
  <path d="M 720 80 L 750 40 L 780 80 Z" fill="#4a5568" opacity="0.4"/>
  <path d="M 740 80 L 765 45 L 790 80 Z" fill="#5a6578" opacity="0.4"/>

  <!-- Title -->
  <text x="480" y="52" font-family="Georgia, serif" font-size="22" fill="#8ec9a6" text-anchor="middle" letter-spacing="6" opacity="0.9">R I V E R W I S E</text>
  <text x="480" y="70" font-family="Georgia, serif" font-size="11" fill="#5a8a6a" text-anchor="middle" letter-spacing="3" opacity="0.7">WORLD MAP</text>

  <!-- Compass rose (bottom-right) -->
  <g transform="translate(880, 460)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#3d6b55" stroke-width="1.5"/>
    <path d="M0 -22 L4 -8 L0 -4 L-4 -8 Z" fill="#8ec9a6" opacity="0.8"/>
    <path d="M0 22 L4 8 L0 4 L-4 8 Z" fill="#4a7a5a" opacity="0.6"/>
    <path d="M-22 0 L-8 4 L-4 0 L-8 -4 Z" fill="#4a7a5a" opacity="0.6"/>
    <path d="M22 0 L8 4 L4 0 L8 -4 Z" fill="#4a7a5a" opacity="0.6"/>
    <text x="0" y="-25" font-family="Georgia" font-size="8" fill="#8ec9a6" text-anchor="middle">N</text>
  </g>
</svg>
